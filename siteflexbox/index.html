<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Meu Site Moderno</title>

  <style>
    html, body {
      height: 100%;
    }
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f0f0;
    }

    .header {
      background: #4facfe;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 25px;
    }

    .container {
      display: flex;
    }

    .menu {
      width: 200px;
      background: #ffffff;
      padding: 10px;
      border-right: 1px solid #ccc;
    }

    .menu ul {
      list-style: none;
      padding: 0;
    }

    .menu li {
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border: 1px solid #ccc;
      width: 400px;
      max-width: 100%;
    }

    .footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .menu {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #ccc;
      }

      .content {
        padding: 10px;
      }

      .card {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    Meu Site  
  </div>

  <div class="container">

    <div class="menu">
      <h3>Menu</h3>
      <ul>
        <li> <link rel="stylesheet" href="home.png">Início</li>
        <li> <link rel="stylesheet" href="usuario-do-arquivo.png">Sobre</li>
        <li><link rel="stylesheet" href="serviços.png"> Serviços</li>
        <li> Contato</li>
      </ul>
    </div>

    <div class="content">
      <div class="card">
        <h2>Bem-vindo!</h2>
        <p>Esse é um layout moderno utilizando Flexbox.</p>
        <p>Agora com visual mais bonito, sombras e cores agradáveis.</p>
      </div>
    </div>

  </div>

  <div class="footer">
    © 2026 - Meu Site
  </div>

</body>
</html>
